version: '3.8'

services:
  app:
    image: ${IMAGE}
    working_dir: /app
    env_file:
      - /opt/spotify/.env
    volumes:
      - /opt/spotify/cache:/app/.cache
      - /opt/spotify/processed_urls.txt:/app/processed_urls.txt
    # Run the updater once on start; scheduling can be handled by host cron.
    command: >
      bash -lc "python create_playlist.py
      --append-to-name 'P3 (Updated hourly)'
      --from-dr-day p3 today
      --processed-urls-file processed_urls.txt
      --image-path DRP3_logo.jpeg
      --keep-duplicates --skip-existing --retention-days 7 -m 300
      -d \"$(cat playlist-description.txt)\""
    restart: "no"

