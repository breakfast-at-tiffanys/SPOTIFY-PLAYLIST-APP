name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize repository to lowercase
        id: repo_lc
        shell: bash
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Docker meta (normalize image name/tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.REPO_LC }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Select latest image ref
        id: image
        shell: bash
        run: |
          latest=$(printf "%s\n" "${{ steps.meta.outputs.tags }}" | tr ' ' '\n' | grep ':latest$' | head -n1)
          echo "image=$latest" >> "$GITHUB_OUTPUT"

  deploy-on-pi:
    name: Deploy on Raspberry Pi (self-hosted)
    needs: build-and-push
    runs-on: [self-hosted, linux, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR (if private)
        shell: bash
        run: |
          if [ -n "${{ secrets.GHCR_PAT }}" ] && [ -n "${{ secrets.GHCR_USER }}" ]; then
            echo "Logging in to GHCR on self-hosted runner"
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
          else
            echo "Skipping GHCR login (no secrets provided). Assuming public image."
          fi

      - name: Prepare persistent directories
        shell: bash
        run: |
          sudo mkdir -p /opt/spotify/cache
          sudo touch /opt/spotify/processed_urls.txt
          sudo chown -R "$USER":"$USER" /opt/spotify

      - name: Pull and start with compose
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Using image: $IMAGE"
          IMAGE="$IMAGE" docker compose -f deploy/docker-compose.yml pull
          IMAGE="$IMAGE" docker compose -f deploy/docker-compose.yml up -d

    # Notes:
    # - Install Docker + Compose plugin on the Pi and register a self-hosted runner
    #   with labels: self-hosted, linux, arm64 (and ensure it's online).
    # - Place Spotify credentials in /opt/spotify/.env on the Pi.
    # - The service runs once per deploy. For hourly schedule, set up host cron,
    #   e.g., `0 * * * * IMAGE=ghcr.io/owner/repo:latest docker compose -f /home/runner/<repo>/deploy/docker-compose.yml up --pull=always --abort-on-container-exit`
