name: Scheduled Run

on:
  schedule:
    # Runs every 10 minutes (UTC)
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-on-pi:
    name: Run playlist updater (self-hosted)
    runs-on: [self-hosted, linux, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize repository to lowercase (for GHCR image)
        id: repo_lc
        shell: bash
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Resolve base dir and env file
        shell: bash
        run: |
          # Allow override via repository variable or secret; fallback to /opt/spotify
          BASE_DIR="${{ vars.SPOTIFY_BASE_DIR }}"
          if [ -z "$BASE_DIR" ]; then BASE_DIR="${{ secrets.SPOTIFY_BASE_DIR }}"; fi
          if [ -z "$BASE_DIR" ]; then BASE_DIR="/opt/spotify"; fi
          echo "BASE_DIR=$BASE_DIR" >> "$GITHUB_ENV"
          # Allow override of env file via repo variable or secret; fallback to $BASE_DIR/.env
          ENV_FILE="${{ vars.SPOTIFY_ENV_FILE }}"
          if [ -z "$ENV_FILE" ]; then ENV_FILE="${{ secrets.SPOTIFY_ENV_FILE }}"; fi
          if [ -z "$ENV_FILE" ]; then ENV_FILE="$BASE_DIR/.env"; fi
          echo "ENV_FILE=$ENV_FILE" >> "$GITHUB_ENV"

      - name: Verify env file exists
        shell: bash
        run: |
          if [ ! -f "$ENV_FILE" ]; then
            echo "::error::Environment file not found at '$ENV_FILE'. Set repository variable or secret SPOTIFY_ENV_FILE, or place the file at '$BASE_DIR/.env'." >&2
            exit 1
          fi

      - name: Login to GHCR (if private)
        shell: bash
        run: |
          if [ -n "${{ secrets.GHCR_PAT }}" ] && [ -n "${{ secrets.GHCR_USER }}" ]; then
            echo "Logging in to GHCR on self-hosted runner"
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
          else
            echo "Skipping GHCR login (assuming public image)"
          fi

      - name: Prepare persistent directories
        shell: bash
        run: |
          set -euo pipefail
          for p in "$BASE_DIR" "$BASE_DIR/cache"; do
            if [ -e "$p" ] && [ ! -d "$p" ]; then
              echo "::error::$p exists but is not a directory. Please remove or rename it." >&2
              ls -l "$p" || true
              exit 1
            fi
          done
          mkdir -p "$BASE_DIR/cache"
          # Ensure token file exists for file-to-file bind mount
          touch "$BASE_DIR/cache/.cache"
          touch "$BASE_DIR/processed_urls.txt"
          chown -R "$USER":"$USER" "$BASE_DIR"

      - name: Run (one-shot) via compose
        env:
          IMAGE: ghcr.io/${{ env.REPO_LC }}:latest
          SPOTIFY_BASE_DIR: ${{ env.BASE_DIR }}
          SPOTIFY_ENV_FILE: ${{ env.ENV_FILE }}
          DEBUG_SCRAPE: '1'
        shell: bash
        run: |
          set -euo pipefail
          echo "Using image: $IMAGE"
          IMAGE="$IMAGE" docker compose -f deploy/docker-compose.yml up --pull=always --abort-on-container-exit
