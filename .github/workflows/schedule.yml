name: Schedule Managed By Cron

on:
  workflow_dispatch:

jobs:
  cron-instructions:
    name: Host cron schedule
    runs-on: ubuntu-latest
    steps:
      - name: Explain cron setup
        shell: bash
        run: |
          cat <<'EOF'
          Playlist updates are no longer scheduled from GitHub Actions.

          Install this cron entry on the host that already has the repo checkout,
          Docker, and the Spotify env file:

          */5 * * * * cd /opt/spotify/spotify-playlist-app && /bin/bash ./scripts/run_schedule.sh >> cron.log 2>&1

          Optional environment overrides for the cron user:
            IMAGE=ghcr.io/<owner>/<repo>:latest
            SPOTIFY_BASE_DIR=/opt/spotify
            SPOTIFY_ENV_FILE=/opt/spotify/.env
            GHCR_USER=<user>
            GHCR_PAT=<token>
            DEBUG_SCRAPE=1
          EOF
